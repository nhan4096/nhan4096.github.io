<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ben Clicker</title>
    </head>
    <body>
        <div class="news-ticker">
            <div class="ticker-content">
                <span id="ticker">Ben rơi vật lạ</span>
            </div>
        </div>
        <div class="tabs">
            <button onclick="game.openTab(0)">Bengay</button>
            <button onclick="game.openTab(1)">Settings</button>
            <button onclick="game.openTab(2)">Achievements</button>
            <button class="button-auto hidden" id="auto-tab" onclick="game.openTab(3)">Auto-Shitter</button>
        </div>
        <div id="bengay">
            <div class="center-flex-vertical shit-text">
                <span>Ben has shat <span class="large-text brown-anim" id="shit-count"> 10 times</span>.</span>
                <span id="shits-per-tick"></span>
            </div>
            <div class="center-flex">
                <div class="building">
                    <span class="brown-anim">Toilets</span>
                    <br>
                    <span id="toilet-count">You have 0 toilets</span>
                    <button class="building-buy" onclick="game.buyToilet()" id="toilet-btn">Buy a toilet (10)</button>
                </div>
                <div class="building hidden" id="toilet-producer">
                    <span class="brown-anim">Toilet Producers</span>
                    <br>
                    <span id="toilet-producer-count">You have 0 toilet producers</span>
                    <button class="building-buy" onclick="game.buyToiletProducer()" id="toilet-producer-btn">Buy a toilet producer (10)</button>
                </div>
            </div>
            <div class="hidden shit-galaxy" id="shit-galaxy">
                <span id="shit-galaxy-count">Shit Galaxy (0)</span>
                <button id="shit-galaxy-btn" onclick="game.shitGalaxy()"></button>
            </div>
        </div>
        <div class="hidden" id="settings">
            <div class="center-flex">
                <div class="settings-box">
                    <button class="large-text" onclick="game.promptLoad()">LOAD SAVEFILE</button>
                </div>
                <div class="settings-box">
                    <button class="large-text" onclick="game.promptSave()">EXPORT SAVEFILE</button>
                </div>
                <div class="settings-box">
                    <button class="large-text" onclick="game.saveBrowser()">SAVE TO BROWSER</button>
                </div>
                <div class="settings-box">
                    <button class="large-text" onclick="game.promptDelete()">RESET THE GAME</button>
                </div>
                <div class="settings-box">
                    <button class="locked large-text" onclick="game.locked()">MUTE ALL SOUNDS</button>
                </div>
            </div>
        </div>
        <div class="hidden" id="achievements">
            <div class="center-flex-vertical">
                <div>
                    <span class="large-text brown-anim">Your Achievements</span>
                    <span id="achievements-list"></span>
                </div>
            </div>
        </div>
        <div class="hidden" id="auto-shitter">
            <div class="center-flex-vertical">
                <div class="auto">
                    <span>Toilet Buyer</span>
                    <input type="checkbox" id="shitter-enabled">
                    <button id="shitter-upgrade" onclick="game.upgradeShitter()"></button>
                </div>
            </div>
        </div>
        <script src="breakinf.js"></script>
        <script src="index.js"></script>
    </body>
</html>
